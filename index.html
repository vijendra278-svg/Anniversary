<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anniversary</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* Tap screen */
#openScreen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(#2c003e,#000);
}

#openScreen h1 {
  font-family:'Great Vibes';
  font-size:50px;
}

button {
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:gold;
  cursor:pointer;
}

/* Main */
#main {
  display:none;
  text-align:center;
  animation:fade 2s;
}

h1 {
  font-family:'Great Vibes';
  font-size:55px;
  color:gold;
}

.section {
  margin:40px 20px;
}

.card {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

/* Photo */
.photo img {
  width:260px;
  border-radius:15px;
  border:3px solid gold;
}

/* Hearts */
.heart {
  position:fixed;
  animation:float 5s linear infinite;
}

@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<!-- Tap -->
<div id="openScreen">
  <h1>💖 Tap to Open 💖</h1>
  <button onclick="start()">Open Invitation</button>
</div>

<!-- Main -->
<div id="main">

<h1>Happy Anniversary</h1>

<div class="section">
  <h2>Vijendra Chauhan ❤️ Rama Chauhan</h2>
</div>

<div class="section card">
  <p>📅 22 April 2016</p>
  <p>📍 Kapashera, New Delhi</p>
</div>

<!-- PHOTO (IMPORTANT CHANGE HERE) -->
<div class="section photo">
  <img src="20211024_215017.jpg">
</div>

<div class="section card">
  <p>
    10 years of love & togetherness 💕<br><br>
    Rab kare yo saath yu hi bana rahe
  </p>
</div>

<div class="section">
  <h2 id="countdown"></h2>
</div>

<div class="section">
  <iframe 
    src="https://www.google.com/maps?q=Kapashera%20New%20Delhi&output=embed"
    width="90%" height="250" style="border-radius:10px;">
  </iframe>
</div>

</div>

<!-- MUSIC (only ONE source) -->
<audio id="music" loop>
  <source src="https://pagalfree.com/musics/128-52-gaj-ka-daman-renuka-panwarr-128-kbps-sound.mp3">
</audio>

<script>
function start(){
  document.getElementById("openScreen").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("music").play();

  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },500);
}

// Countdown
var d=new Date("April 22, 2026").getTime();

setInterval(()=>{
  var now=new Date().getTime();
  var gap=d-now;

  var days=Math.floor(gap/(1000*60*60*24));
  var hours=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  var minutes=Math.floor((gap%(1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML=
  "⏳ "+days+" Days "+hours+" Hours "+minutes+" Minutes";
},1000);
</script>

</body>
</html>
